<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Área do Cliente | Clyora AI</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<header class="header">
  <div class="logo">Clyora<span>AI</span></div>
  <a href="index.html" class="btn-header">Início</a>
</header>

<section class="form-page">
  <div class="login-box">
    <span class="section-label">Área do cliente</span>
    <h1>Acesse sua conta</h1>
    <p class="subtitle">Entre com o e-mail e senha cadastrados após a confirmação do pagamento.</p>

    <div id="authMessage" class="auth-message"></div>

    <form>
      <label>E-mail</label>
      <input id="email" type="email" placeholder="seu@email.com"/>

      <label>Senha</label>
      <input id="senha" type="password" placeholder="Digite sua senha"/>

      <button type="button" id="btnEntrar" class="btn-primary full">
        Entrar
      </button>
    </form>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="cliente.js"></script>

</body>
</html>
