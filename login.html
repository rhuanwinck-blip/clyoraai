<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Clyora AI</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
<header class="header">
  <div class="logo">Clyora<span>AI</span></div>
  <a href="index.html" class="btn-header">Início</a>
</header>

<section class="form-page">
  <div class="login-box">
    <span class="section-label">Área do cliente</span>
    <h1>Entrar no painel</h1>
    <p class="subtitle">Acesse sua conta para monitorar assinatura, IA, anúncios e conexões.</p>

    <form>
      <label>E-mail</label>
      <input type="email" placeholder="seu@email.com" required />

      <label>Senha</label>
      <input type="password" placeholder="Sua senha" required />

      <a href="dashboard.html" class="btn-primary full">Entrar</a>
    </form>
  </div>
</section>
</body>
</html>
