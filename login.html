<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Login | Clyora AI</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<header class="header">
  <div class="logo">
    <span class="logo-mark">C</span>
    <span class="logo-text">Clyora<span>AI</span></span>
  </div>
  <a href="index.html" class="btn-header">Início</a>
</header>

<section class="form-page">
  <div class="login-box">
    <span class="section-label">Área do cliente</span>
    <h1>Entrar no painel</h1>
    <p class="subtitle">Acesse sua conta com o e-mail e a senha cadastrados antes do pagamento.</p>

    <div id="authMessage" class="auth-message"></div>

    <form id="loginForm">
      <label for="email">E-mail</label>
      <input id="email" type="email" placeholder="seu@email.com" required />

      <label for="senha">Senha</label>
      <input id="senha" type="password" placeholder="Sua senha" required />

      <button type="submit" id="btnEntrar" class="btn-primary full">Entrar</button>
    </form>
  </div>
</section>

<script src="cliente.js"></script>
</body>
</html>
